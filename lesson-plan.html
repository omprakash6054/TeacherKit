<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Plan Template | EduTools Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .tool-container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        .document-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            backdrop-filter: blur(10px);
        }
        .header-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .input-group { margin-bottom: 2rem; }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }
        input[type="text"], textarea {
            width: 100%;
            background: transparent;
            border: 1px solid transparent;
            padding: 0.75rem;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }
        textarea { resize: vertical; min-height: 100px; }
        input[type="text"]:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
            outline: none;
        }
        
        /* Print Styles */
        @media print {
            body { background: white; color: black; }
            .bg-canvas, nav, .hero, .print-hide { display: none !important; }
            .tool-container { padding: 0; }
            .document-card { border: none; padding: 0; }
            input[type="text"], textarea { color: black; padding: 0; border: none !important; resize: none; overflow: hidden; }
            .input-group label { color: black; border-bottom: 2px solid black; }
        }
    </style>
</head>

<body>
    <div class="bg-canvas print-hide" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <nav id="main-nav" class="print-hide">
        <div class="nav-inner">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                <span>EduTools Hub</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><i class="fas fa-arrow-left"></i> Back to Hub</a>
            </div>
        </div>
    </nav>

    <main class="tool-container">
        <section class="hero print-hide" style="padding: 4rem 0 2rem;">
            <h1>Lesson Plan <span class="gradient-text">Template</span></h1>
            <p class="hero-sub">Structured fill-in-the-blank format for effective planning.</p>
        </section>

        <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem;" class="print-hide">
            <button class="btn-primary" onclick="window.print()">
                <i class="fas fa-print"></i> Print / Save PDF
            </button>
        </div>

        <div class="document-card">
            <input type="text" placeholder="Lesson Title" style="font-size: 2.5rem; font-weight: 800; margin-bottom: 2rem; padding-left: 0;">
            
            <div class="header-grid">
                <div>
                    <label style="color: var(--text-muted); font-size: 0.8rem; display: block;">Subject</label>
                    <input type="text" placeholder="e.g., Mathematics">
                </div>
                <div>
                    <label style="color: var(--text-muted); font-size: 0.8rem; display: block;">Date / Duration</label>
                    <input type="text" placeholder="e.g., 24th Oct, 45 mins">
                </div>
                <div>
                    <label style="color: var(--text-muted); font-size: 0.8rem; display: block;">Grade Level</label>
                    <input type="text" placeholder="e.g., Year 8">
                </div>
            </div>

            <div class="input-group">
                <label>Learning Objectives</label>
                <textarea placeholder="By the end of this lesson, students will be able to..."></textarea>
            </div>

            <div class="input-group">
                <label>Materials & Resources</label>
                <textarea placeholder="List required textbooks, tech, handouts..." style="min-height: 80px;"></textarea>
            </div>

            <div class="input-group">
                <label>Introduction / Hook (10 mins)</label>
                <textarea placeholder="How will you engage the students at the start?"></textarea>
            </div>

            <div class="input-group">
                <label>Instruction / Main Activity (25 mins)</label>
                <textarea placeholder="Step-by-step procedure of the core lesson..." style="min-height: 150px;"></textarea>
            </div>

            <div class="input-group">
                <label>Conclusion / Plenary (10 mins)</label>
                <textarea placeholder="How will you wrap up and check for understanding?"></textarea>
            </div>

            <div class="input-group">
                <label>Assessment / Homework</label>
                <textarea placeholder="How will you measure success?"></textarea>
            </div>
        </div>
    </main>

    <script>
        // Auto-resize textareas to fit content for printing
        document.querySelectorAll('textarea').forEach(el => {
            el.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });
        });
    </script>
</body>
</html>
