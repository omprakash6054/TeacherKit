<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flipper | EduTools Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .tool-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }
        .coin-container {
            perspective: 1000px;
            width: 200px;
            height: 200px;
            margin: 4rem auto;
        }
        #coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            border: 8px solid #ffd700;
            background: #f1c40f;
            color: #b8860b;
        }
        .tails {
            transform: rotateY(180deg);
            background: #e67e22;
            border-color: #d35400;
            color: #a04000;
        }
        #coin.heads { transform: rotateY(0deg); }
        #coin.tails { transform: rotateY(1800deg); } /* Extra spins */
        #coin.flip-heads { transform: rotateY(1800deg); }
        #coin.flip-tails { transform: rotateY(1980deg); }
    </style>
</head>

<body>
    <div class="bg-canvas" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <nav id="main-nav">
        <div class="nav-inner">
            
                
                <div class="logo">
                <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                <span>EduTools Hub</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><i class="fas fa-arrow-left"></i> Back to Hub</a>
            </div>
        </div>
    </nav>

    <main class="tool-container">
        <section class="hero" style="padding: 4rem 0 2rem;">
            <a href="index.html" class="hero-back-link"><i class="fas fa-arrow-left"></i> Back to Hub</a>
            <h1>Coin <span class="gradient-text">Flipper</span></h1>
            <p class="hero-sub">A simple way to resolve choices in the classroom.</p>
        </section>

        <div class="coin-container">
            <div id="coin">
                <div class="face heads"><i class="fas fa-user"></i></div>
                <div class="face tails"><i class="fas fa-crown"></i></div>
            </div>
        </div>

        <button class="btn-primary" id="flip-btn" style="min-width: 200px;">
            <i class="fas fa-redo"></i> Flip Coin
        </button>
        <p id="result-text" style="margin-top: 2rem; font-size: 1.5rem; font-weight: 700; min-height: 2rem;"></p>
    </main>

    <script>
        const coin = document.getElementById('coin');
        const flipBtn = document.getElementById('flip-btn');
        const resultText = document.getElementById('result-text');

        flipBtn.addEventListener('click', () => {
            const isHeads = Math.random() < 0.5;
            resultText.textContent = 'Flipping...';
            
            coin.style.transform = 'none';
            setTimeout(() => {
                if (isHeads) {
                    coin.style.transform = 'rotateY(1800deg)';
                } else {
                    coin.style.transform = 'rotateY(1980deg)';
                }
                
                setTimeout(() => {
                    resultText.textContent = isHeads ? 'HEADS!' : 'TAILS!';
                }, 1500);
            }, 100);
        });
    </script>
</body>

</html>
