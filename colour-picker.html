<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Picker | EduTools Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .tool-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }
        .picker-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 32px;
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
        }
        .color-preview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 0 40px var(--primary-glow);
            transition: all 0.3s;
        }
        input[type="color"] {
            width: 100px;
            height: 50px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: transparent;
        }
        .color-values {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }
        .value-row {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-family: monospace;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <div class="bg-canvas" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <nav id="main-nav">
        <div class="nav-inner">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                <span>EduTools Hub</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><i class="fas fa-arrow-left"></i> Back to Hub</a>
            </div>
        </div>
    </nav>

    <main class="tool-container">
        <section class="hero" style="padding: 4rem 0 2rem;">
            <h1>Colour <span class="gradient-text">Picker</span></h1>
            <p class="hero-sub">Select and copy colours for your classroom materials.</p>
        </section>

        <div class="picker-card">
            <div class="color-preview" id="preview"></div>
            <input type="color" id="picker" value="#6366f1">
            
            <div class="color-values">
                <div class="value-row">
                    <span>HEX</span>
                    <span id="hex-val">#6366F1</span>
                </div>
                <div class="value-row">
                    <span>RGB</span>
                    <span id="rgb-val">rgb(99, 102, 241)</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const picker = document.getElementById('picker');
        const preview = document.getElementById('preview');
        const hexVal = document.getElementById('hex-val');
        const rgbVal = document.getElementById('rgb-val');

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgb(${r}, ${g}, ${b})`;
        }

        picker.addEventListener('input', (e) => {
            const color = e.target.value.toUpperCase();
            preview.style.backgroundColor = color;
            preview.style.boxShadow = `0 0 40px ${color}66`;
            hexVal.textContent = color;
            rgbVal.textContent = hexToRgb(color);
        });

        preview.style.backgroundColor = picker.value;
    </script>
</body>

</html>
