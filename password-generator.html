<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator | EduTools Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .tool-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
        }
        .pass-display {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 24px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        #password-text {
            font-size: 1.75rem;
            font-weight: 700;
            font-family: monospace;
            letter-spacing: 2px;
            word-break: break-all;
        }
        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .copy-btn:hover {
            transform: scale(1.1);
            background: #4f46e5;
        }
        .option-group {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .slider-wrap {
            margin: 1rem 0;
        }
    </style>
</head>

<body>
    <div class="bg-canvas" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <nav id="main-nav">
        <div class="nav-inner">
            
                
                <div class="logo">
                <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                <span>EduTools Hub</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><i class="fas fa-arrow-left"></i> Back to Hub</a>
            </div>
        </div>
    </nav>

    <main class="tool-container">
        <section class="hero" style="padding: 4rem 0 2rem;">
            <a href="index.html" class="hero-back-link"><i class="fas fa-arrow-left"></i> Back to Hub</a>
            <h1>Password <span class="gradient-text">Generator</span></h1>
            <p class="hero-sub">Create secure, student-friendly passwords instantly.</p>
        </section>

        <div class="pass-display">
            <span id="password-text">S3cur3!P4ss</span>
            <button class="copy-btn" id="copy-btn" title="Copy to clipboard">
                <i class="fas fa-copy"></i>
            </button>
        </div>

        <div class="option-group">
            <div class="slider-wrap">
                <div class="control-header">
                    <label>Password Length</label>
                    <span class="quality-display" id="length-val">12</span>
                </div>
                <input type="range" id="length-slider" min="6" max="32" value="12">
            </div>

            <div class="option-row">
                <label>Include Uppercase</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="upper-check" checked>
                    <span class="toggle-track"></span>
                </label>
            </div>
            <div class="option-row">
                <label>Include Numbers</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="num-check" checked>
                    <span class="toggle-track"></span>
                </label>
            </div>
            <div class="option-row">
                <label>Include Symbols</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="sym-check" checked>
                    <span class="toggle-track"></span>
                </label>
            </div>

            <button class="btn-primary" id="gen-btn" style="margin-top: 1rem;">
                <i class="fas fa-sync-alt"></i> Generate New Password
            </button>
        </div>
    </main>

    <script>
        const passText = document.getElementById('password-text');
        const genBtn = document.getElementById('gen-btn');
        const copyBtn = document.getElementById('copy-btn');
        const lengthSlider = document.getElementById('length-slider');
        const lengthVal = document.getElementById('length-val');
        const upperCheck = document.getElementById('upper-check');
        const numCheck = document.getElementById('num-check');
        const symCheck = document.getElementById('sym-check');

        const chars = 'abcdefghijklmnopqrstuvwxyz';
        const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const syms = '!@#$%^&*()_+~`|}{[]:;?><,./-=';

        function generate() {
            let pool = chars;
            if (upperCheck.checked) pool += upper;
            if (numCheck.checked) pool += nums;
            if (symCheck.checked) pool += syms;

            let password = '';
            for (let i = 0; i < lengthSlider.value; i++) {
                password += pool.charAt(Math.floor(Math.random() * pool.length));
            }
            passText.textContent = password;
        }

        lengthSlider.addEventListener('input', () => {
            lengthVal.textContent = lengthSlider.value;
            generate();
        });

        genBtn.addEventListener('click', generate);

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(passText.textContent);
            const icon = copyBtn.querySelector('i');
            icon.className = 'fas fa-check';
            setTimeout(() => icon.className = 'fas fa-copy', 2000);
        });

        generate(); // Initial
    </script>
</body>

</html>
