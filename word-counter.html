<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter | EduTools Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .tool-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            display: block;
        }
        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .word-textarea {
            width: 100%;
            height: 400px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1.1rem;
            resize: none;
            transition: all 0.3s;
        }
        .word-textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }
    </style>
</head>

<body>
    <div class="bg-canvas" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <nav id="main-nav">
        <div class="nav-inner">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                <span>EduTools Hub</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><i class="fas fa-arrow-left"></i> Back to Hub</a>
            </div>
        </div>
    </nav>

    <main class="tool-container">
        <section class="hero" style="padding: 4rem 0 2rem;">
            <h1>Word <span class="gradient-text">Counter</span></h1>
            <p class="hero-sub">Analyse your text instantly. Check assignment lengths and reading time.</p>
        </section>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-value" id="word-count">0</span>
                <span class="stat-label">Words</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="char-count">0</span>
                <span class="stat-label">Characters</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="sentence-count">0</span>
                <span class="stat-label">Sentences</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="reading-time">0 min</span>
                <span class="stat-label">Reading Time</span>
            </div>
        </div>

        <textarea id="word-input" class="word-textarea" placeholder="Paste or type your text here..."></textarea>
    </main>

    <script src="word-counter.js"></script>
</body>

</html>
