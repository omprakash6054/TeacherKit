<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer & Stopwatch | EduTools Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .tool-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }
        .timer-display {
            font-size: 8rem;
            font-weight: 800;
            font-family: monospace;
            margin: 3rem 0;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px var(--primary-glow);
        }
        .time-controls {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .presets {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .preset-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .preset-btn:hover {
            background: var(--primary);
            border-color: transparent;
        }
    </style>
</head>

<body>
    <div class="bg-canvas" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <nav id="main-nav">
        <div class="nav-inner">
            
                
                <div class="logo">
                <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                <span>EduTools Hub</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link"><i class="fas fa-arrow-left"></i> Back to Hub</a>
            </div>
        </div>
    </nav>

    <main class="tool-container">
        <section class="hero" style="padding: 4rem 0 2rem;">
            <a href="index.html" class="hero-back-link"><i class="fas fa-arrow-left"></i> Back to Hub</a>
            <h1>Timer & <span class="gradient-text">Stopwatch</span></h1>
            <p class="hero-sub">Manage your classroom transitions and activities with precision.</p>
        </section>

        <div class="timer-display" id="display">05:00</div>

        <div class="time-controls">
            <button class="btn-primary" id="start-btn" style="min-width: 150px;">
                <i class="fas fa-play"></i> Start
            </button>
            <button class="btn-secondary" id="reset-btn">
                <i class="fas fa-undo"></i> Reset
            </button>
        </div>

        <div class="presets">
            <button class="preset-btn" data-time="60">1 Min</button>
            <button class="preset-btn" data-time="300">5 Mins</button>
            <button class="preset-btn" data-time="600">10 Mins</button>
            <button class="preset-btn" data-time="900">15 Mins</button>
            <button class="preset-btn" data-time="1800">30 Mins</button>
        </div>
    </main>

    <script>
        let timeLeft = 300;
        let timerId = null;
        let isRunning = false;

        const display = document.getElementById('display');
        const startBtn = document.getElementById('start-btn');
        const resetBtn = document.getElementById('reset-btn');
        const presets = document.querySelectorAll('.preset-btn');

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            display.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerId);
                startBtn.innerHTML = '<i class="fas fa-play"></i> Start';
                isRunning = false;
            } else {
                if (timeLeft <= 0) return;
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        isRunning = false;
                        startBtn.innerHTML = '<i class="fas fa-play"></i> Start';
                        alert('Time is up!');
                    }
                }, 1000);
                startBtn.innerHTML = '<i class="fas fa-pause"></i> Pause';
                isRunning = true;
            }
        }

        startBtn.addEventListener('click', toggleTimer);
        resetBtn.addEventListener('click', () => {
            clearInterval(timerId);
            timeLeft = 300;
            isRunning = false;
            startBtn.innerHTML = '<i class="fas fa-play"></i> Start';
            updateDisplay();
        });

        presets.forEach(btn => {
            btn.addEventListener('click', () => {
                clearInterval(timerId);
                timeLeft = parseInt(btn.dataset.time);
                isRunning = false;
                startBtn.innerHTML = '<i class="fas fa-play"></i> Start';
                updateDisplay();
            });
        });

        updateDisplay();
    </script>
</body>

</html>
